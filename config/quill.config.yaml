# QUILL runtime config. Read at startup; air-gap + tier toggles are the safety-critical knobs.
version: 1

# Safety / deployment (docs/05)
# NOTE: this config is in DEMO mode — air_gap is OFF because the active model
# is a :cloud variant served by Ollama Cloud. Artifact text DOES leave the box.
# Production deployments MUST flip air_gap back to true and use a local model
# (e.g. mistral:7b or mistral-small:24b).
air_gap: false                # DEMO — was true; flipped for Ollama Cloud Tier 2
tier3_enabled: false          # cloud Tier 3 (Claude) still OFF

# Tier 2 — Ollama Cloud, primary model locked to kimi-k2.5:cloud (Moonshot K2.5).
# Phase II plan §4.F / DECISION-019. Trillion-param MoE class; strong long-context
# reasoning + structured-output reliability. Fallback chain configured below.
# Production (Phase III) will swap host to a local Ollama daemon + mistral:24b.
ollama:
  host: "http://localhost:11434"
  # NOTE: kimi-k2.5 / qwen3.5 / glm-5.1 require a paid Ollama Cloud subscription
  # on this account. Demo defaults to gemma4:31b-cloud which is on the free tier.
  # Switch back to kimi-k2.5:cloud once the subscription is active.
  model: "gemma4:31b-cloud"
  fallback_models:
    - "kimi-k2.5:cloud"
    - "qwen3.5:cloud"
    - "glm-5.1:cloud"
enable_tier2_at_startup: true

# Tier 1 retrieval (local; configured at WP-3 / T-3.1)
retrieval:
  embedding_model: "local"    # placeholder until T-3.1
  top_k: 8

# Confidence + breaker (mirror rubric.yaml; rubric is authoritative)
confidence:
  emit: 0.75
  needs_review: 0.50
  defer_below: 0.50
circuit_breaker:
  threshold: 3

# Catalog / rubric paths
catalog_path: "config/catalog-nist-800-53-rev5.yaml"
rubric_path: "config/rubric.yaml"

# Ingestion
ingest:
  watch_folder: null          # set a path to enable folder-watch (FR-ING-07)
  max_artifact_mb: 50

# Tenancy
tenant: "default"
